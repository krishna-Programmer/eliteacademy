<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Exam Manager v4</title>

<!-- External Libraries -->
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Google Fonts: Clean academic feel -->
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ============================================================
   CSS VARIABLES & RESET
   ============================================================ */
:root {
  --bg:        #f0f2f7;
  --card:      #ffffff;
  --border:    #d8dce8;
  --text:      #1a1d2e;
  --muted:     #6b7280;
  --accent:    #3b6ff5;
  --accent-h:  #2d5ee0;
  --danger:    #e53e3e;
  --success:   #2ecc71;
  --warn:      #f59e0b;
  --rank1:     #fef3c7;
  --rank2:     #e0f2fe;
  --rank3:     #f0fdf4;
  --shadow:    0 2px 8px rgba(0,0,0,0.08);
  --radius:    10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
}

/* ============================================================
   LAYOUT
   ============================================================ */
.container { max-width: 1150px; margin: auto; padding: 12px; }

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 12px 16px;
  margin-bottom: 10px;
}

/* ============================================================
   HEADER CARD
   ============================================================ */
.header {
  text-align: center;
}

.header h1 {
  font-size: 20px;
  font-weight: 600;
  letter-spacing: 0.5px;
  outline: none; /* contenteditable, no ugly border */
}

.header h1:focus {
  border-bottom: 2px dashed var(--accent);
}

.header-meta {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 6px;
  color: var(--muted);
  font-size: 12px;
}

.header-meta input {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 3px 7px;
  background: var(--bg);
  width: 180px;
}

.header-meta input.narrow { width: 65px; }

/* ============================================================
   TOOLBAR / CONTROLS
   ============================================================ */
.toolbar {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 6px;
}

/* Exam selector dropdown */
#examSelect {
  padding: 5px 8px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  cursor: pointer;
}

/* Generic button styles */
button {
  padding: 5px 11px;
  border: none;
  border-radius: 6px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
}
button:hover  { opacity: 0.88; }
button:active { transform: scale(0.96); }

/* Button colour variants */
.btn-primary  { background: var(--accent);  color: #fff; }
.btn-danger   { background: var(--danger);  color: #fff; }
.btn-success  { background: var(--success); color: #fff; }
.btn-warn     { background: var(--warn);    color: #fff; }
.btn-neutral  { background: #e5e7eb;        color: var(--text); }
.btn-edit     { background: #7c3aed;        color: #fff; }
.btn-icon     { background: #e5e7eb;        color: var(--text); font-size: 14px; padding: 5px 9px; }

/* Divider between button groups in toolbar */
.toolbar-sep {
  width: 1px;
  height: 22px;
  background: var(--border);
  margin: 0 2px;
}

/* ============================================================
   COLUMN VISIBILITY PANEL
   ============================================================ */
#colPanel {
  display: none;
  flex-wrap: wrap;
  gap: 10px;
  padding: 10px 14px;
}

#colPanel label {
  display: flex;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  font-size: 12px;
}

/* ============================================================
   STATUS BAR  (sync feedback)
   ============================================================ */
#statusBar {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 6px;
  display: none;          /* shown only when message active */
  margin-left: auto;
  font-weight: 500;
}
#statusBar.info    { background: #dbeafe; color: #1d4ed8; display: inline-block; }
#statusBar.success { background: #dcfce7; color: #166534; display: inline-block; }
#statusBar.error   { background: #fee2e2; color: #991b1b; display: inline-block; }

/* ============================================================
   TABLE
   ============================================================ */
.table-wrapper { overflow-x: auto; }

table {
  border-collapse: collapse;
  width: 100%;
  font-size: 12px;
  background: var(--card);
}

th, td {
  border: 1px solid var(--border);
  padding: 5px 7px;
  text-align: center;
  white-space: nowrap;
}

th {
  background: #f3f4f8;
  font-weight: 600;
  font-size: 11px;
  letter-spacing: 0.3px;
  color: var(--muted);
  text-transform: uppercase;
}

/* Rank colouring */
td.rank-1 { background: var(--rank1); font-weight: 600; }
td.rank-2 { background: var(--rank2); }
td.rank-3 { background: var(--rank3); }

/* Inline edit inputs inside table */
td input {
  width: 55px;
  padding: 3px 5px;
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  text-align: center;
  background: var(--bg);
}

td input.wide { width: 130px; text-align: left; }

/* ID / Name columns — left-align for readability */
td:nth-child(1), td:nth-child(2), td:nth-child(3) { text-align: left; }

/* Delete button in table */
.btn-del {
  padding: 2px 8px;
  font-size: 11px;
  background: #fee2e2;
  color: var(--danger);
  border-radius: 4px;
  border: 1px solid #fca5a5;
}

/* ============================================================
   SORTABLE HEADERS
   ============================================================ */

/* Rank columns that are clickable for sorting */
th.sortable {
  cursor: pointer;
  user-select: none;
  position: relative;
  transition: background 0.15s;
}
th.sortable:hover { background: #e2e5f0; }

/* Sort indicator arrow appended after header text */
th.sortable::after {
  content: " ↕";
  font-size: 10px;
  opacity: 0.35;
}
th.sort-asc::after  { content: " ▲"; opacity: 1; color: var(--accent); }
th.sort-desc::after { content: " ▼"; opacity: 1; color: var(--accent); }

/* Active sort column header gets a subtle accent underline */
th.sort-asc, th.sort-desc {
  color: var(--accent);
  background: #eef2ff;
}

/* ============================================================
   PRINT STYLES
   ============================================================ */
@media print {
  body { zoom: 0.80; background: #fff; }
  .toolbar, #colPanel, #statusBar { display: none !important; }
  .table-wrapper { overflow: visible; }
  .card { box-shadow: none; border: none; }
}
</style>
</head>

<body>
<div class="container">

  <!-- ======================================================
       HEADER CARD  — editable title, exam name, date, max marks
       ====================================================== -->
  <div class="card header">
    <h1 contenteditable="true" id="academyTitle">ELITE MEDICAL ACADEMY : KHAMMAM</h1>
    <div class="header-meta">
      <input id="examName" value="LONGTERM CT - 5" title="Exam Name">
      <!-- ID is the mandatory unique key for every student -->
      | DATE: <span id="dateDisplay"></span>
      | MAX: <input id="maxMarks" value="720" class="narrow" title="Max Marks">
    </div>
  </div>

  <!-- ======================================================
       TOOLBAR CARD
       ====================================================== -->
  <div class="card">
    <div class="toolbar" id="toolbar">

      <!-- Exam selector -->
      <select id="examSelect" onchange="UI.loadExam()"></select>
      <button class="btn-primary"  onclick="UI.newExam()">+ New</button>
      <button class="btn-danger"   onclick="UI.deleteExam()">Delete</button>

      <span class="toolbar-sep"></span>

      <!-- Student management -->
      <button class="btn-neutral"  onclick="UI.addStudent()">+ Student</button>
      <button class="btn-neutral"  onclick="CSV.triggerLoad()">Load CSV</button>
      <!-- hidden file inputs -->
      <input type="file" id="csvFileInput"     accept=".csv"  style="display:none" onchange="CSV.load(this)">
      <input type="file" id="restoreFileInput" accept=".json" style="display:none" onchange="Backup.restore(this)">

      <span class="toolbar-sep"></span>

      <!-- Export -->
      <button class="btn-success"  onclick="Export.excel()">Excel</button>
      <button class="btn-success"  onclick="Export.csv()">CSV</button>
      <button class="btn-neutral"  onclick="window.print()">PDF</button>

      <span class="toolbar-sep"></span>

      <!-- Backup / Restore / Cloud -->
      <button class="btn-warn"     onclick="Backup.download()">Backup</button>
      <button class="btn-warn"     onclick="Backup.triggerRestore()">Restore</button>
      <button class="btn-neutral"  onclick="Cloud.sync()">☁ Sync</button>

      <span class="toolbar-sep"></span>

      <!-- View / Edit toggle -->
      <button class="btn-edit"     onclick="UI.toggleMode()" id="modeBtn">✏ Edit Mode</button>
      <button class="btn-icon"     onclick="UI.toggleColPanel()">⚙️</button>

      <!-- Status feedback (right-aligned via margin-left:auto) -->
      <span id="statusBar"></span>
    </div>

    <!-- Column visibility checkboxes (hidden by default) -->
    <div id="colPanel" class="card" style="margin-top:8px;margin-bottom:0">
      <label><input type="checkbox" checked data-col="bot">      Botany</label>
      <label><input type="checkbox" checked data-col="botRank">  Botany Rank</label>
      <label><input type="checkbox" checked data-col="zoo">      Zoology</label>
      <label><input type="checkbox" checked data-col="zooRank">  Zoology Rank</label>
      <label><input type="checkbox" checked data-col="phy">      Physics</label>
      <label><input type="checkbox" checked data-col="phyRank">  Physics Rank</label>
      <label><input type="checkbox" checked data-col="che">      Chemistry</label>
      <label><input type="checkbox" checked data-col="cheRank">  Chemistry Rank</label>
      <label><input type="checkbox" checked data-col="total">    Total</label>
      <label><input type="checkbox" checked data-col="totalRank">Total Rank</label>
      <label><input type="checkbox" checked data-col="del">      Delete Col</label>
    </div>
  </div>

  <!-- ======================================================
       DATA TABLE
       ====================================================== -->
  <div class="card table-wrapper">
    <table>
      <thead id="thead"></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

</div><!-- /container -->

<!-- ============================================================
     JAVASCRIPT — Modular IIFE pattern for clear separation
     ============================================================

  Modules:
    Store   — localStorage read / write helpers
    Cloud   — Supabase read / write helpers
    Ranks   — ranking + totals calculation logic
    State   — shared mutable application state
    UI      — DOM rendering, edit/view toggle, exam CRUD
    CSV     — load students from CSV file
    Export  — Excel and CSV export
    Backup  — JSON backup download and restore
    App     — bootstrap / initialisation
============================================================ -->
<script>

/* ============================================================
   STORE MODULE — Thin wrapper around localStorage
   ============================================================ */
const Store = (() => {
  const KEY = "exams";

  /** Read all exams from localStorage. Returns plain object. */
  function get() {
    return JSON.parse(localStorage.getItem(KEY) || "{}");
  }

  /** Persist all exams to localStorage. */
  function set(data) {
    localStorage.setItem(KEY, JSON.stringify(data));
  }

  return { get, set };
})();


/* ============================================================
   CLOUD MODULE — Supabase integration
   ============================================================

  Uses a single row (id=1) in the "exam_data" table with a
  jsonb column called "data" that stores the entire exams object.
  Table DDL:
    create table exam_data (id int primary key, data jsonb);
============================================================ */
const Cloud = (() => {
  // TODO: Replace with your own project URL and publishable key
  const SUPABASE_URL = "https://sgqvttgaqfnmtmtxroyj.supabase.co";
  const SUPABASE_KEY = "sb_publishable_rs4ksREQHYbU4hcFbrufjg_ICN0m2v6";

  const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  /**
   * Pull data from Supabase and merge into localStorage.
   * Called once on app start. Silently fails if offline.
   */
  async function pull() {
    try {
      const { data, error } = await client
        .from("exam_data")
        .select("*")
        .eq("id", 1)
        .single();

      if (!error && data?.data) {
        // Cloud wins on initial load — overwrite local cache
        Store.set(data.data);
        return data.data;
      }
    } catch (e) {
      console.warn("Cloud pull skipped:", e.message);
    }
    return null;
  }

  /**
   * Push the current in-memory exams object to Supabase.
   * Upsert ensures the row is created if it doesn't exist yet.
   */
  async function sync() {
    UI.setStatus("Syncing…", "info");
    try {
      const { error } = await client
        .from("exam_data")
        .upsert({ id: 1, data: State.exams });

      if (error) throw error;
      UI.setStatus("Synced ✓", "success");
    } catch (e) {
      console.error("Cloud sync failed:", e.message);
      UI.setStatus("Sync failed ✗", "error");
    }
  }

  return { pull, sync };
})();


/* ============================================================
   RANKS MODULE — Calculate totals and subject/overall ranks
   ============================================================ */
const Ranks = (() => {
  const SUBJECTS = ["bot", "zoo", "phy", "che"];

  /**
   * Recalculate totals and all rank fields for every student
   * in the currently active exam.
   *
   * Tie-handling: tied students share the same (lower) rank,
   * and the next distinct score skips ranks accordingly —
   * e.g. ranks 1, 1, 3, 4 (not 1, 1, 2, 3).
   */
  function calc() {
    const students = State.currentStudents();

    // 1. Recalculate totals
    students.forEach(s => {
      s.total = s.bot + s.zoo + s.phy + s.che;
    });

    // 2. Subject ranks
    SUBJECTS.forEach(field => {
      // Sort descending by this subject score
      const sorted = [...students].sort((a, b) => b[field] - a[field]);

      sorted.forEach((student, idx) => {
        if (idx === 0) {
          student.ranks[field] = 1;
        } else {
          // Same score as the student above → share that rank
          student.ranks[field] =
            student[field] === sorted[idx - 1][field]
              ? sorted[idx - 1].ranks[field]
              : idx + 1;
        }
      });
    });

    // 3. Overall (total) rank — same tie logic
    const sortedTotal = [...students].sort((a, b) => b.total - a.total);
    sortedTotal.forEach((student, idx) => {
      if (idx === 0) {
        student.totalRank = 1;
      } else {
        student.totalRank =
          student.total === sortedTotal[idx - 1].total
            ? sortedTotal[idx - 1].totalRank
            : idx + 1;
      }
    });
  }

  return { calc };
})();


/* ============================================================
   STATE MODULE — Single source of truth for app data
   ============================================================ */
const State = (() => {
  let exams   = {};    // { "Exam 1": [ ...students ] }
  let current = "";    // currently selected exam name
  let editMode = false;

  /**
   * Which columns are currently visible in the table.
   * Keys match data-col attributes in the colPanel checkboxes.
   */
  const visible = {
    bot: true, botRank: true,
    zoo: true, zooRank: true,
    phy: true, phyRank: true,
    che: true, cheRank: true,
    total: true, totalRank: true,
    del: true
  };

  /**
   * Current sort state.
   *   field  — which field to sort by: "bot","zoo","phy","che","total", or null (original order)
   *   dir    — "asc" | "desc"
   * Clicking the same rank column toggles asc ↔ desc.
   * Clicking a different column resets to desc (highest rank first).
   */
  const sort = { field: null, dir: "desc" };

  /** Shortcut to get the student array for the active exam. */
  function currentStudents() {
    return exams[current] || [];
  }

  return { exams, current, editMode, visible, sort, currentStudents,
           // Setters that also update the let bindings
           setCurrent(v)  { current  = v; State.current  = v; },
           setEditMode(v) { editMode = v; State.editMode = v; },
           setExams(v)    { exams    = v; State.exams    = v; }
         };
})();


/* ============================================================
   UI MODULE — DOM rendering and user-interaction handlers
   ============================================================ */
const UI = (() => {

  /* ----------------------------------------------------------
     Status bar helpers
  ---------------------------------------------------------- */

  let _statusTimer = null;

  /** Show a brief status message in the toolbar. */
  function setStatus(msg, type = "info", ms = 3000) {
    const bar = document.getElementById("statusBar");
    bar.className = type;
    bar.textContent = msg;
    clearTimeout(_statusTimer);
    _statusTimer = setTimeout(() => { bar.className = ""; bar.textContent = ""; }, ms);
  }

  /* ----------------------------------------------------------
     Exam list (dropdown)
  ---------------------------------------------------------- */

  /** Rebuild the exam <select> dropdown from State.exams keys. */
  function renderExamList() {
    const sel = document.getElementById("examSelect");
    sel.innerHTML = Object.keys(State.exams)
      .map(name => `<option ${name === State.current ? "selected" : ""}>${name}</option>`)
      .join("");
  }

  /** Called when dropdown changes — loads the selected exam. */
  function loadExam() {
    State.setCurrent(document.getElementById("examSelect").value);
    renderTable();
  }

  /** Prompt user for a name, create a new empty exam. */
  function newExam() {
    const name = prompt("New exam name:");
    if (!name || !name.trim()) return;
    State.exams[name.trim()] = [];
    State.setCurrent(name.trim());
    _saveAndRender();
    renderExamList();
  }

  /** Delete the currently selected exam after confirmation. */
  function deleteExam() {
    if (!confirm(`Delete "${State.current}"? This cannot be undone.`)) return;
    delete State.exams[State.current];
    _saveAndRender();
    App.init();          // reset to first available exam
  }

  /* ----------------------------------------------------------
     View / Edit mode toggle
  ---------------------------------------------------------- */

  /**
   * Toggle between view-only (clean printable layout) and
   * edit mode (inline inputs + delete buttons visible).
   */
  function toggleMode() {
    State.setEditMode(!State.editMode);
    document.getElementById("modeBtn").textContent =
      State.editMode ? "👁 View Mode" : "✏ Edit Mode";
    renderTable();
  }

  /* ----------------------------------------------------------
     Column visibility panel
  ---------------------------------------------------------- */

  /** Show / hide the column checkbox panel. */
  function toggleColPanel() {
    const panel = document.getElementById("colPanel");
    const isHidden = panel.style.display === "none" || panel.style.display === "";
    panel.style.display = isHidden ? "flex" : "none";

    // Attach change handlers each time panel opens (idempotent)
    document.querySelectorAll("#colPanel input[type=checkbox]").forEach(cb => {
      cb.onchange = () => {
        State.visible[cb.dataset.col] = cb.checked;
        renderTable();
      };
    });
  }

  /* ----------------------------------------------------------
     Student CRUD
  ---------------------------------------------------------- */

  /**
   * Add a new student. ID is the mandatory unique key.
   * All other fields are optional and default to empty/zero.
   */
  function addStudent() {
    const id = prompt("Enter Student ID (mandatory, must be unique):");
    if (!id || !id.trim()) {
      alert("Student ID is required and cannot be empty.");
      return;
    }
    const trimmedId = id.trim();

    // Reject duplicate IDs within the same exam
    const duplicate = State.currentStudents().some(s => s.id === trimmedId);
    if (duplicate) {
      alert(`Student ID "${trimmedId}" already exists in this exam.`);
      return;
    }

    State.currentStudents().push({
      id: trimmedId,
      name: "",                           // optional — can be filled in edit mode
      bot: 0, zoo: 0, phy: 0, che: 0,    // optional — default 0
      ranks: {}, total: 0, totalRank: 0
    });
    _calcSaveRender();
  }

  /**
   * Update a single field on student at array-index i.
   *   - "id"   → string; must be non-empty and unique across the exam
   *   - "name" → string; optional, no uniqueness constraint
   *   - others → number (subject scores)
   */
  function updateStudent(i, field, value) {
    const student = State.currentStudents()[i];

    if (field === "id") {
      const trimmed = value.trim();
      if (!trimmed) { alert("ID cannot be empty."); return; }
      // Uniqueness check: compare against every OTHER student
      const dup = State.currentStudents().some((s, idx) => idx !== i && s.id === trimmed);
      if (dup) { alert(`ID "${trimmed}" is already used by another student.`); return; }
      student.id = trimmed;
    } else if (field === "name") {
      student.name = value;               // plain string, no validation needed
    } else {
      student[field] = +value;            // coerce to number for score fields
    }

    _calcSaveRender();
  }

  /** Remove student at index i from the current exam. */
  function deleteStudent(i) {
    State.currentStudents().splice(i, 1);
    _saveAndRender();
  }

  /* ----------------------------------------------------------
     Table rendering
  ---------------------------------------------------------- */

  /** Render both the header row and all student rows. */
  function renderTable() {
    _renderHeader();
    _renderRows();
  }

  /**
   * Build the <thead> row using the current visible config.
   * Rank columns (B.Rank, Z.Rank, P.Rank, C.Rank, Rank) are
   * clickable to sort the table. Active sort column is highlighted.
   */
  function _renderHeader() {
    const v = State.visible;
    const s = State.sort;

    /**
     * Generate a sortable <th> for a rank column.
     * @param {string} field   — data field to sort by (e.g. "bot", "total")
     * @param {string} label   — display text (e.g. "B.Rank")
     */
    function _sortTh(field, label) {
      const isCurrent = s.field === field;
      const cls = isCurrent ? `sortable sort-${s.dir}` : "sortable";
      return `<th class="${cls}" onclick="UI.sortBy('${field}')">${label}</th>`;
    }

    let html = "<tr><th>#</th><th>ID</th><th>Name</th>";

    if (v.bot)      html += "<th>Botany</th>";
    if (v.botRank)  html += _sortTh("bot",   "B.Rank");

    if (v.zoo)      html += "<th>Zoology</th>";
    if (v.zooRank)  html += _sortTh("zoo",   "Z.Rank");

    if (v.phy)      html += "<th>Physics</th>";
    if (v.phyRank)  html += _sortTh("phy",   "P.Rank");

    if (v.che)      html += "<th>Chemistry</th>";
    if (v.cheRank)  html += _sortTh("che",   "C.Rank");

    if (v.total)    html += "<th>Total</th>";
    if (v.totalRank)html += _sortTh("total", "Rank");

    if (State.editMode && v.del) html += "<th>Del</th>";

    html += "</tr>";
    document.getElementById("thead").innerHTML = html;
  }

  /**
   * Helper: render a rank <td> with colour coding for top 3.
   */
  function _rankCell(rankVal) {
    const cls = rankVal === 1 ? "rank-1" : rankVal === 2 ? "rank-2" : rankVal === 3 ? "rank-3" : "";
    return `<td class="${cls}">${rankVal || ""}</td>`;
  }

  /**
   * Build all <tbody> rows.
   *
   * Display order respects the current sort state (State.sort).
   * NOTE: sorting is VIEW-ONLY — the underlying array in State.exams
   * is never reordered, so ranks and edit-mode indices stay stable.
   * We map each displayed student back to its true array index so
   * that updateStudent / deleteStudent still work correctly.
   */
  function _renderRows() {
    const v    = State.visible;
    const edit = State.editMode;
    const src  = State.currentStudents();

    // Build an array of [originalIndex, student] pairs, then sort for display
    let display = src.map((s, i) => [i, s]);

    if (State.sort.field) {
      const field = State.sort.field;
      const asc   = State.sort.dir === "asc";

      display.sort(([, a], [, b]) => {
        // Sort by the rank value (lower rank number = better performance)
        // Use score as secondary sort for stability within same rank
        const rankA = field === "total" ? (a.totalRank || 9999) : (a.ranks[field] || 9999);
        const rankB = field === "total" ? (b.totalRank || 9999) : (b.ranks[field] || 9999);

        if (rankA !== rankB) return asc ? rankA - rankB : rankB - rankA;

        // Tie-break: sort by score descending for visual clarity
        const scoreA = field === "total" ? a.total : a[field];
        const scoreB = field === "total" ? b.total : b[field];
        return scoreB - scoreA;
      });
    }

    const rows = display.map(([origIdx, s], displayPos) => {
      let row = `<tr>
        <td>${displayPos + 1}</td>
        <td>${edit ? `<input class="wide" value="${_esc(s.id)}"
              onchange="UI.updateStudent(${origIdx},'id',this.value)">` : _esc(s.id)}</td>
        <td>${edit ? `<input class="wide" value="${_esc(s.name)}"
              onchange="UI.updateStudent(${origIdx},'name',this.value)">` : _esc(s.name)}</td>`;

      // Subject columns — pass origIdx to updateStudent so edits target the right student
      [["bot","botRank"],["zoo","zooRank"],["phy","phyRank"],["che","cheRank"]]
        .forEach(([subj, rankKey]) => {
          if (v[subj])
            row += `<td>${edit
              ? `<input type="number" value="${s[subj]}"
                   onchange="UI.updateStudent(${origIdx},'${subj}',this.value)">`
              : s[subj]}</td>`;
          if (v[rankKey]) row += _rankCell(s.ranks[subj]);
        });

      if (v.total)     row += `<td><strong>${s.total}</strong></td>`;
      if (v.totalRank) row += _rankCell(s.totalRank);

      if (edit && v.del)
        row += `<td><button class="btn-del" onclick="UI.deleteStudent(${origIdx})">✕</button></td>`;

      row += "</tr>";
      return row;
    });

    document.getElementById("tbody").innerHTML = rows.join("");
  }

  /* ----------------------------------------------------------
     Private helpers
  ---------------------------------------------------------- */

  /** Escape HTML special chars to prevent XSS in inline values. */
  function _esc(str) {
    return String(str ?? "")
      .replace(/&/g,"&amp;").replace(/</g,"&lt;")
      .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  /** Recalculate ranks, save to localStorage + cloud, re-render. */
  function _calcSaveRender() {
    Ranks.calc();
    Store.set(State.exams);
    Cloud.sync();
    renderTable();
  }

  /** Save to localStorage + cloud, re-render (no rank recalc). */
  function _saveAndRender() {
    Store.set(State.exams);
    Cloud.sync();
    renderTable();
  }

  /**
   * Called when user clicks a rank column header.
   * Toggles asc ↔ desc if clicking the same field;
   * resets to desc (best rank first) when switching fields.
   *
   * @param {string} field — "bot" | "zoo" | "phy" | "che" | "total"
   */
  function sortBy(field) {
    const s = State.sort;
    if (s.field === field) {
      // Same column → toggle direction
      s.dir = s.dir === "desc" ? "asc" : "desc";
    } else {
      // New column → default to desc (rank 1 at top)
      s.field = field;
      s.dir   = "desc";
    }
    renderTable();
  }

  return {
    setStatus, renderExamList, loadExam, newExam, deleteExam,
    toggleMode, toggleColPanel,
    addStudent, updateStudent, deleteStudent,
    sortBy, renderTable
  };
})();


/* ============================================================
   CSV MODULE — Load / upsert students from a CSV file
   ============================================================

  Rules:
    • "id" column is MANDATORY — rows without an id are skipped.
    • All other columns (name, bot, zoo, phy, che) are OPTIONAL.
      If a column is absent from the CSV, that field is left
      unchanged for existing students or defaults to "" / 0 for
      new ones.
    • UPSERT by ID:
        - If a student with that id already exists → update only
          the columns present in this CSV (others unchanged).
        - If the id is new → insert as a fresh student row.

  Accepted column name aliases (case-insensitive, partial match):
    id        → id, roll, rollno, student_id, studentid
    name      → name, student_name
    botany    → bot, botany
    zoology   → zoo, zoology
    physics   → phy, physics
    chemistry → che, chem, chemistry
============================================================ */
const CSV = (() => {

  /** Opens the hidden file input to let the user pick a CSV. */
  function triggerLoad() {
    document.getElementById("csvFileInput").value = ""; // reset so same file can be re-picked
    document.getElementById("csvFileInput").click();
  }

  /**
   * Parse the selected CSV and upsert students into the current exam.
   *
   * Upsert logic (keyed on "id"):
   *   EXISTING id → overwrite only the columns present in this CSV.
   *   NEW id      → insert a new student row with available columns.
   *   MISSING id  → row is skipped and counted in skippedCount.
   *
   * @param {HTMLInputElement} input — the file <input> element
   */
  function load(input) {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = e => {

      // Split into non-empty lines
      const lines = e.target.result
        .split("\n")
        .map(l => l.trim())
        .filter(l => l.length > 0);

      if (lines.length < 2) {
        alert("CSV appears empty or has no data rows.");
        return;
      }

      // ── Step 1: Map header names to column indices ──────────────
      const headers = lines[0].toLowerCase().split(",").map(h => h.trim());

      const col = {
        id:   _findCol(headers, ["id", "roll", "rollno", "student_id", "studentid"]),
        name: _findCol(headers, ["name", "student_name"]),
        bot:  _findCol(headers, ["bot", "botany"]),
        zoo:  _findCol(headers, ["zoo", "zoology"]),
        phy:  _findCol(headers, ["phy", "physics"]),
        che:  _findCol(headers, ["che", "chem", "chemistry"])
      };

      // ID column is mandatory — abort if missing
      if (col.id === -1) {
        alert(
          "No ID column found in this CSV.\n\n" +
          "Please add a column named one of: id, roll, rollno, student_id"
        );
        return;
      }

      // ── Step 2: Build a lookup map of existing students by id ───
      // { "S001": <student object ref>, ... }
      const existingById = {};
      State.currentStudents().forEach(s => {
        if (s.id) existingById[s.id] = s;
      });

      // ── Step 3: Process each data row ───────────────────────────
      let insertedCount = 0;
      let updatedCount  = 0;
      let skippedCount  = 0;

      for (let i = 1; i < lines.length; i++) {
        const parts = lines[i].split(",").map(p => p.trim());

        // Extract ID — mandatory; skip row if blank
        const rawId = col.id !== -1 ? (parts[col.id] ?? "").trim() : "";
        if (!rawId) {
          skippedCount++;
          continue;
        }

        if (existingById[rawId]) {
          // ── UPDATE: student already exists ──────────────────────
          // Only overwrite fields that are present in this CSV.
          const s = existingById[rawId];
          if (col.name !== -1) s.name = parts[col.name] ?? s.name;
          if (col.bot  !== -1) s.bot  = +parts[col.bot]  || s.bot;
          if (col.zoo  !== -1) s.zoo  = +parts[col.zoo]  || s.zoo;
          if (col.phy  !== -1) s.phy  = +parts[col.phy]  || s.phy;
          if (col.che  !== -1) s.che  = +parts[col.che]  || s.che;
          updatedCount++;

        } else {
          // ── INSERT: new student ─────────────────────────────────
          // Absent columns default to "" (strings) or 0 (numbers).
          const newStudent = {
            id:   rawId,
            name: col.name !== -1 ? (parts[col.name] ?? "")   : "",
            bot:  col.bot  !== -1 ? (+parts[col.bot]  || 0)   : 0,
            zoo:  col.zoo  !== -1 ? (+parts[col.zoo]  || 0)   : 0,
            phy:  col.phy  !== -1 ? (+parts[col.phy]  || 0)   : 0,
            che:  col.che  !== -1 ? (+parts[col.che]  || 0)   : 0,
            ranks: {}, total: 0, totalRank: 0
          };
          State.currentStudents().push(newStudent);
          existingById[rawId] = newStudent; // prevent duplicate within same CSV
          insertedCount++;
        }
      }

      // ── Step 4: Recalculate ranks and persist ───────────────────
      Ranks.calc();
      Store.set(State.exams);
      Cloud.sync();
      UI.renderTable();

      // ── Step 5: Show summary ────────────────────────────────────
      const parts = [];
      if (insertedCount) parts.push(`${insertedCount} added`);
      if (updatedCount)  parts.push(`${updatedCount} updated`);
      if (skippedCount)  parts.push(`${skippedCount} skipped (no ID)`);
      UI.setStatus(parts.join(" · ") + " ✓", "success", 5000);
    };

    reader.readAsText(file);
  }

  /**
   * Find the first column index whose lowercased header contains
   * any of the given keyword strings.
   *
   * @param {string[]} headers  — lowercased header array
   * @param {string[]} keywords — list of partial-match strings
   * @returns {number} column index, or -1 if not found
   */
  function _findCol(headers, keywords) {
    return headers.findIndex(h => keywords.some(k => h.includes(k)));
  }

  return { triggerLoad, load };
})();


/* ============================================================
   EXPORT MODULE — Excel and CSV export
   ============================================================ */
const Export = (() => {

  /**
   * Build a 2D array (headers + rows) respecting visible columns.
   * Used by both Excel and CSV export.
   */
  function _buildMatrix() {
    const v    = State.visible;
    const rows = [[]]; // rows[0] = header row

    // Header
    rows[0].push("ID", "Name");
    if (v.bot)      rows[0].push("Botany");
    if (v.botRank)  rows[0].push("Botany Rank");
    if (v.zoo)      rows[0].push("Zoology");
    if (v.zooRank)  rows[0].push("Zoology Rank");
    if (v.phy)      rows[0].push("Physics");
    if (v.phyRank)  rows[0].push("Physics Rank");
    if (v.che)      rows[0].push("Chemistry");
    if (v.cheRank)  rows[0].push("Chemistry Rank");
    if (v.total)    rows[0].push("Total");
    if (v.totalRank)rows[0].push("Total Rank");

    // Data rows
    State.currentStudents().forEach(s => {
      const row = [s.id, s.name];
      if (v.bot)      row.push(s.bot);
      if (v.botRank)  row.push(s.ranks.bot   ?? "");
      if (v.zoo)      row.push(s.zoo);
      if (v.zooRank)  row.push(s.ranks.zoo   ?? "");
      if (v.phy)      row.push(s.phy);
      if (v.phyRank)  row.push(s.ranks.phy   ?? "");
      if (v.che)      row.push(s.che);
      if (v.cheRank)  row.push(s.ranks.che   ?? "");
      if (v.total)    row.push(s.total);
      if (v.totalRank)row.push(s.totalRank   ?? "");
      rows.push(row);
    });

    return rows;
  }

  /** Download as .xlsx using the SheetJS library. */
  function excel() {
    const matrix = _buildMatrix();
    const ws = XLSX.utils.aoa_to_sheet(matrix);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, State.current.slice(0, 31)); // sheet name ≤31 chars
    XLSX.writeFile(wb, State.current + ".xlsx");
  }

  /** Download as plain .csv file. */
  function csv() {
    const matrix = _buildMatrix();
    const content = matrix.map(row => row.join(",")).join("\n");
    _download(content, State.current + ".csv", "text/csv");
  }

  /** Utility: trigger a browser file download. */
  function _download(content, filename, mime) {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([content], { type: mime }));
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href); // clean up
  }

  return { excel, csv };
})();


/* ============================================================
   BACKUP MODULE — JSON backup and restore
   ============================================================ */
const Backup = (() => {

  /** Serialize all exams to a JSON file and prompt download. */
  function download() {
    const content = JSON.stringify(State.exams, null, 2);
    const ts      = new Date().toISOString().slice(0, 10);
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([content], { type: "application/json" }));
    a.download = `exam-backup-${ts}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
  }

  /** Opens the hidden file input for JSON restore. */
  function triggerRestore() {
    document.getElementById("restoreFileInput").value = "";
    document.getElementById("restoreFileInput").click();
  }

  /**
   * Read the chosen JSON file and merge / replace local data.
   *
   * @param {HTMLInputElement} input — the file input element
   */
  function restore(input) {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = e => {
      let parsed;
      try {
        parsed = JSON.parse(e.target.result);
      } catch {
        alert("Invalid JSON file.");
        return;
      }

      const replace = confirm(
        "OK = Replace ALL existing data with backup\nCancel = Merge (backup exams are added, existing kept)"
      );

      if (replace) {
        State.setExams(parsed);
      } else {
        // Merge: backup exams override same-named local exams
        Object.assign(State.exams, parsed);
      }

      Store.set(State.exams);
      Cloud.sync();
      App.init(); // re-initialise UI with restored data
      UI.setStatus("Backup restored ✓", "success");
    };

    reader.readAsText(file);
  }

  return { download, triggerRestore, restore };
})();


/* ============================================================
   APP MODULE — Bootstrap sequence
   ============================================================ */
const App = (() => {

  /**
   * (Re-)initialise the entire application.
   * Called on first load and after restore.
   */
  function init() {
    // Ensure at least one exam exists
    if (!Object.keys(State.exams).length) {
      State.exams["Exam 1"] = [];
    }

    // Default to the first exam
    State.setCurrent(Object.keys(State.exams)[0]);

    UI.renderExamList();
    UI.renderTable();
  }

  /**
   * Entry point — runs on page load.
   * 1. Show today's date
   * 2. Load local data
   * 3. Try to pull fresher data from cloud
   * 4. Initialise UI
   */
  async function start() {
    // Set date display
    document.getElementById("dateDisplay").textContent =
      new Date().toLocaleDateString("en-IN", { day: "2-digit", month: "short", year: "numeric" });

    // Load from localStorage first (instant)
    State.setExams(Store.get());

    // Attempt cloud pull (may overwrite with fresher data)
    const cloudData = await Cloud.pull();
    if (cloudData) State.setExams(cloudData);

    init();
  }

  return { init, start };
})();


/* ============================================================
   BOOTSTRAP — Start the application
   ============================================================ */
App.start();

</script>
